services:
  - type: web
    name: stackbid-app
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "22"

  - type: cron
    name: stackbid-price-agent
    runtime: node
    schedule: "0 9 * * *"
    buildCommand: npm install
    startCommand: node price-agent.js
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_EMAIL
        sync: false

  - type: cron
    name: stackbid-market-scan-agent
    runtime: node
    schedule: "0 8 * * 1"
    buildCommand: npm install
    startCommand: node market-scan-agent.js
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
